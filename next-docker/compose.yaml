version: '3.9'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    
    # do port mapping so that we can access the app from the browser
    ports:
      - 3000:3000
    
    # use docker compose to watch for changes and rebuild the container
    develop:
      watch:
        - path: ./package.json
          action: rebuild
        - path: ./next.config.js
          action: rebuild
        - path: ./package-lock.json
          action: rebuild
        - path: .
          target: /app
          action: sync
    
    environment:
      # we're using MongoDB atlas so we need to pass in the connection string
      DB_URL: ****************************

  # we're using MongoDB atlas so we don't need to run a local instance of MongoDB
  # but if you want to run a local instance, you can do it this way
  # db:
  #   image: mongo
  #   ports:
  #     - 27017:27017
  #   environment:
  #     - MONGO_INITDB_ROOT_USERNAME=Rishabh
  #     - MONGO_INITDB_ROOT_PASSWORD=rnZzJjIDr3bIDvtv lll
  #   volumes:
  #     - tasked:/data/db
    
volumes:
  tasked:
